name: Publish to PyPI

# Builds the wheel + sdist and publishes them to PyPI when a GitHub Release
# is published. Uses PyPI Trusted Publishing (OIDC), so no API token or secret
# is needed once the publisher is configured on PyPI. See RELEASING.md.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/parajudica
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)".*/\1/')"
          echo "git tag: $tag   pyproject: $pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::git tag ($tag) != pyproject version ($pkg) -- bump pyproject or fix the tag"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
