<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parajudica</title>
<meta name="description" content="Parajudica computes data compliance classifications rather than requiring them to be assigned by hand.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<script>window.Prism = { manual: true };</script>
<script src="prism.min.js"></script>
</head>
<body>
  <main id="content"></main>
  <noscript>
    <h1>Parajudica</h1>
    <p>Parajudica computes data compliance classifications rather than requiring them to be assigned by hand.</p>
    <p><a href="https://github.com/alfredr/parajudica">github.com/alfredr/parajudica</a></p>
  </noscript>

  <script type="module">
    import { marked } from "https://cdn.jsdelivr.net/npm/marked@15/lib/marked.esm.js";
    const md = await (await fetch("content.md")).text();
    const main = document.getElementById("content");
    main.innerHTML = marked.parse(md);
    if (window.Prism && window.Prism.highlightAllUnder) window.Prism.highlightAllUnder(main);
    main.classList.add("ready");
  </script>
</body>
</html>
